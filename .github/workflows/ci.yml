name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      # wrangler types includes vars from .env.local in the generated Env,
      # so the check only matches the committed file if the same var names exist
      - name: Create web env file
        run: cp apps/web/.env.example apps/web/.env.local

      - name: Typecheck
        run: pnpm check

      - name: Test
        run: pnpm test
